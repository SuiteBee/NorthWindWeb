name: Push and Deploy
on:
    push:
        branches:
            - main
    workflow_dispatch:
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout 🛎️
              uses: actions/checkout@v6

            - name: Set Node.js
              uses: actions/setup-node@v6
              with:
                node-version: 24
                cache: npm
            
            - name: Install Dependencies
              run: npm ci

            - name: Build 🔧
              run: npm run build
              
    deploy:
        needs: build
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main'
        
        steps:
            - name: Deploy 🚀
              uses: JamesIves/github-pages-deploy-action@4.1.3
              with:
                branch: gh-pages
                folder: dist
  